<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Already Exists | SmartStream</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;

            /* 🎵 Music Background Image */
            background: 
                linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                url("https://images.unsplash.com/photo-1511379938547-c1f69419868d");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .card {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 16px;
            width: 420px;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.7s ease-in-out;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h2 {
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 25px;
        }

        a {
            display: inline-block;
            padding: 12px 26px;
            background: #1db954;
            color: #000;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        a:hover {
            background: #17a74a;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon">🎧</div>
        <h2>User Already Exists</h2>
        <p>
            This email is already registered on <b>SmartStream</b>.<br>
            Please login or try registering with another email.
        </p>

        <a href="/api/register">Back to Register</a>
    </div>

</body>
</html>
