<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartStream | Songs & Videos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #000;
        }

        /* Navigation Bar */
        header {
            width: 100%;
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 22px;
            color: #0077cc;
        }

        nav a {
            margin-left: 15px;
            text-decoration: none;
            color: #0077cc;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #005fa3;
        }

        /* Container smaller */
        .container {
            max-width: 700px;
            margin: 30px auto;  /* less margin */
            background: #ffffff; 
            padding: 20px;      /* reduced padding */
            border-radius: 12px;
            text-align: center;
        }

        h1{
            margin-bottom: 15px;
            color: #333;
            font-size: 26px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 8px;  /* reduced padding */
            border-bottom: 1px solid #ccc;
            color: #333;
        }

        th {
            color: #0077cc;
        }

        tr:hover {
            background-color: #f0f0f0;
        }

        /* Normal Play / Pause Button */
        button.play-btn {
            padding: 5px 10px;   /* smaller button */
            border-radius: 5px;
            font-size: 13px;
            cursor: pointer;
            background-color: #0077cc;
            border: none;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        button.play-btn:hover {
            background-color: #005fa3;
        }

        /* Add Song Button */
        .add-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;  /* smaller button */
            background-color: #00cc77;
            color: white;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .add-btn:hover {
            background-color: #00995a;
        }

        audio, video {
            margin-top: 5px;
            display: none;
        }
    </style>
</head>

<body>

<!-- Navigation -->
<header>
    <h1>SmartStream</h1>
    <nav>
        <a href="/api/home">Home</a>
        <a href="/api/login">Login</a>
    </nav>
</header>

<div class="container">

    <h1>All Songs</h1>

    <table>
        <tr>
            <th>Title</th>
            <th>Play</th>
        </tr>

        <tr th:each="song,iterStat : ${songs}">
            
            <td th:text="${song.titel}">Song Name</td>

            <td>
                <!-- Audio Player -->
                <audio th:if="${#strings.endsWith(#strings.toLowerCase(song.audio_url),'.mp3')
                              or #strings.endsWith(#strings.toLowerCase(song.audio_url),'.wav')
                              or #strings.endsWith(#strings.toLowerCase(song.audio_url),'.ogg')
                              or #strings.endsWith(#strings.toLowerCase(song.audio_url),'.m4a')}"
                       id="media-[[${iterStat.index}]]">
                    <source th:src="${song.audio_url}" type="audio/mpeg"/>
                </audio>

                <!-- Video Player -->
                <video th:if="${#strings.endsWith(#strings.toLowerCase(song.audio_url),'.mp4')
                              or #strings.endsWith(#strings.toLowerCase(song.audio_url),'.mov')
                              or #strings.endsWith(#strings.toLowerCase(song.audio_url),'.avi')
                              or #strings.endsWith(#strings.toLowerCase(song.audio_url),'.mkv')}"
                       id="media-[[${iterStat.index}]]"
                       width="200">
                    <source th:src="${song.audio_url}" type="video/mp4"/>
                </video>

                <!-- Play Button -->
                <button class="play-btn"
                        th:onclick="'togglePlay(' + ${iterStat.index} + ')'">
                    Play
                </button>
            </td>

        </tr>

    </table>

    <a class="add-btn" href="/songs/addsong">
        ➕ Add New Song / Video
    </a>

</div>

<script>
function togglePlay(index){
    const media = document.getElementById("media-" + index);
    const button = media.nextElementSibling;

    // Pause all other media
    document.querySelectorAll("audio,video").forEach((m)=>{
        if(m.id !== "media-" + index){
            m.pause();
            m.style.display = "none";
            const otherBtn = m.nextElementSibling;
            if(otherBtn) otherBtn.innerText = "Play";
        }
    });

    // Play or pause current media
    if(media.paused){
        media.style.display="block";
        media.play();
        button.innerText="Pause";
    } else {
        media.pause();
        button.innerText="Play";
    }

    media.onended = function(){
        button.innerText = "Play";
        media.style.display = "none";
    }
}
</script>

</body>
</html>
