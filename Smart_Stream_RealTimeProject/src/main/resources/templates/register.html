<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartStream 2026 | Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

/* Full Background Image */
body {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1511379938547-c1f69419868d") no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Dark overlay */
body::before {
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.55);
    z-index:0;
}

/* Header */
header {
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background: rgba(0,0,0,0.7);
    z-index:2;
}

header h1 { font-size:28px; color:white; }

header nav a {
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-weight:bold;
    transition:0.3s;
}
header nav a:hover { color:#ffcc00; }

/* Register Card */
.card {
    position: relative;
    width: 350px;
    padding: 30px;
    background-color: #ffffff; 
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(0,0,0,0.3);
    text-align: center;
    z-index:2;
}

/* Fields */
.field { position: relative; margin-bottom: 20px; }
.field input {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;
    background: #f0f0f0; color: #333; font-size: 14px;
}
.field label {
    position: absolute; top: 12px; left: 12px; color: #666;
    font-size: 13px; pointer-events: none; transition: 0.3s;
}
.field input:focus + label,
.field input:valid + label { top: -8px; font-size: 11px; color: #00aaff; }

/* Dropdown */
select {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;
    background: #f0f0f0; color: #333; font-size: 14px; margin-bottom: 20px;
}
select option { color:#333; background:#fff; }

/* Button */
button {
    width: 100%; padding: 12px; border:none; border-radius:10px;
    background-color:#00aaff; color:white; font-weight:bold; font-size:14px;
    cursor:pointer; transition:0.3s;
}
button:hover { background-color: #0088cc; }

/* Links */
.link { text-align:center; margin-top:15px; }
.link a { color:#00aaff; text-decoration:none; font-size:14px; }
</style>
</head>

<body>

	<header>
	    <h1>SmartStream</h1>
	    <nav>
	        <a href="/api/home">Home</a>
	        <a href="/api/register">Register</a>
	        <a href="/api/login">Login</a>
	    </nav>
	</header>

<!-- Register Section -->
<section id="register">
    <div class="card">
        <h1>Register</h1>
        <form action="/api/registerUser" method="get">
            <div class="field">
                <input type="text" name="username" required>
                <label>Username</label>
            </div>
            <div class="field">
                <input type="email" name="email" required>
                <label>Email</label>
            </div>
            <div class="field">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
            </select>
            <button type="submit">Register</button>
        </form>
        <div class="link"><a href="/api/login">Already have an account? Login</a></div>
    </div>
</section>

</body>
</html>
