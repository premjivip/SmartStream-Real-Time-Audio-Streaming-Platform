<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartStream | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 0;
}

/* Header */
header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 50px;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
}

header h1 {
    color: white;
    font-size: 24px;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: #00aaff;
}

/* Login Box */
.login-box {
    position: relative;
    width: 320px;
    padding: 25px;
    background-color: #ffffff; 
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    text-align: center;
    z-index: 2;
    margin-top: 100px; /* push below header */
}

.login-box h2 {
    font-size: 24px;
    color: #333;
    margin-bottom: 10px;
}

.login-box p {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #f0f0f0; 
    color: #333; 
    font-size: 13px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background-color: #00aaff; 
    color: white; 
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #0088cc;
}

.extra {
    margin-top: 15px;
    font-size: 13px;
    color: #555;
}

.extra a {
    color: #00aaff;
    text-decoration: none;
    margin-left: 5px;
}

.extra a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<header>
    <h1>SmartStream</h1>
    <nav>
        <a href="/api/home">Home</a>
        <a href="/api/register">Register</a>
        <a href="/api/login">Login</a>
    </nav>
</header>

<div class="login-box">
    <h2>SmartStream</h2>
    <p>Sign in to your account</p>

    <form action="/api/jwtToken" method="get">
        <div class="input-group">
            <input name="username" placeholder="Username" required>
        </div>

        <div class="input-group">
            <input name="password" type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="extra">
        Don't have an account? <a href="/api/register">Register</a>
    </div>
</div>

</body>
</html>
